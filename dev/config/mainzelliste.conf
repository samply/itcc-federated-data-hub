servers.0.permissions = createSession;showSessionIds;createToken;tt_addPatient;tt_readPatients;tt_editPatient;tt_deleteConsent;tt_addConsent;tt_searchConsents;tt_addConsentTemplate;tt_readConsentTemplate;tt_searchConsentTemplates;tt_deleteConsentTemplate;tt_addConsentPolicySet;tt_readConsentPolicySet;tt_searchConsentPolicySets;tt_addConsentPolicy;tt_readConsentPolicy;tt_searchConsentPolicies;tt_deleteConsentPolicy
servers.0.allowedRemoteAdresses = 0.0.0.0/0

# Allowed origins for cross origin resource sharing (CORS), multiple values separated by ";"
# servers.allowedOrigins = https://mdat-server.example.org
# Configuration for CORS Preflight configuration. Corresponding headers will be added to response on the preflight
# servers.allowedHeaders = mainzellisteApiKey;mainzellisteApiVersion
# servers.allowedMethods = OPTIONS;GET;POST
# servers.allowedMaxAge = 600

# OAuth configuration:
#
# Set issuer identifier {iss-id} and authorization server url {iss-url}
# oidc.{iss-id}.iss={iss-url}
#oidc.keycloak.iss=https://organization.com/auth
#
# Set authorization server internal url {iss-url}
# oidc.{iss-id}.iss.internalBaseUrl={iss-internal-url}
#oidc.keycloak.iss.internalBaseUrl=http://keycloak-container:8034
#
# Define Claims:
#
# Specify claim id {id} and the authentication protocol. Allowed values : OIDC (OpenID Connect)
# claims.{id}.auth={authentication-protocol}
#claims.0.auth=OIDC
#
# Specify issuer identifier
# claims.{id}.oidc.iss={iss-id}
#claims.0.oidc.iss=keycloak
#
# how to validate multiple claims. Allowed values : 'OR' or 'AND'
# default: AND
# claims.{id}.oidc.operator={operator}
#claims.0.oidc.operator=OR
#
# set claim and values. Claim values separated by , or ;
# Note: Mainzelliste UI support only the claim-name "roles"
# claims.{id}.oidc.{claim-name}={claim-values}
#claims.0.oidc.roles=admin
#
# ANY or ALL subset tells how to validate claims value list defined in "claims.{id}.oidc.{claim-name}={claim-values}"
# default: ANY
# claims.{id}.oidc.{claim-name}.subset={subset-operator}
#claims.0.oidc.roles.subset=ANY
#
# similar to "servers.{id}.permissions" you can either specify the permissions granted to the claim
# in "claims.{i}.permissions" as a semicolons ``;`` or comma ',' seperated list or use
# the shorthand configuration
# claims.{id}.permissions.{configAttribute-0}. ... .{configAttribute-n} = {values comma ',' separated}
# to allows fine-grained permissions (See below)
#
# simple permission configuration
# claims.{id}.permissions = {values}
# e.g :
# claims.{n}.permissions = createSession;createToken;tt_addPatient;tt_readPatients;tt_editPatient;tt_deletePatient

# Grained Permissions:
#
# A shorthand for efficiently configuring a grained "permissions".
# {client}.{id}.permissions.{configAttribute-0}. ... .{configAttribute-n} = {values comma ',' separated}
# Can be used instead of "{client}.{id}.permissions". {client} can be either "claim" or "servers"
# ⚠ you may habe to enable refined permission toggle "extendedPermissionCheck = true" ⚠
#
# (optional) As described above a tenant restrict access to a subset of patients with specific ids
# ⚠ If at least one client ("servers." or "claimes.") is assigned to a tenant, you must specify the tenant for each client configuration. ⚠
# {client}.{i}.permissions.tenant = {tenant-name}
#
# specify allowed patient operations. Allowed values are "C, R, U, D" or "*".
# {client}.{i}.permissions.patient.operations = C, R, U, D
#
# {idType} must be configured in "idgenerators". Wildcard "*" is allowed
# specify allowed patient non-external ids operations. Allowed values are "C, R" or "*". Note: create "D" not supported yet
# {client}.{i}.permissions.patient.ids.{idType}.operations = C, R
# specify allowed patient external ids operations. Allowed values are "U, R" or "*". Note: create "C" and "D" not supported yet
# {client}.{i}.permissions.patient.externalIds.{idType}.operations = U, R
#
# {fieldName} must be configured in "field.". Wildcard "*" is allowed
# specify allowed patient fields operations. Allowed values are "U, R" or "*". Note: create "C" and "D" not supported yet
# {client}.{i}.permissions.patient.fields.{fieldName}.operations = R, U
#
# specify allowed consent operations. Allowed values are "C, R, U, D" or "*".
# {client}.{i}.permissions.patient.consent.operations = C, R, U, D
#
# specify allowed consent template operations. Allowed values are "C, R", "D" or "*"
# {client}.{i}.permissions.consentTemplate.operations = C, R, D
#
# specify allowed policy set operations. Allowed values are "C, R", "D" or "*"
# {client}.{i}.permissions.policySet.operations = C, R, D
#
# specify allowed policy operations. Allowed values are "C, R", "D" or "*"
# {client}.{i}.permissions.policy.operations = C, R, D
#
# {client}.{i}.permissions.miscellaneous = createSession, deleteSession, createToken, tt_checkMatch, tt_addPatients, callback, redirect, readAllPatients, readAllPatientIds, readAllPatientIdTypes, readConfiguration, tt_editConfiguration, tt_addConsentScan, getPatientCount, getTentativePatientCount, getIDRequestCount, getCpuInfo, getMemoryInfo

# Allowed Format of callback
callback.allowedFormat = https://.*
callback.allowSelfsigned = false

