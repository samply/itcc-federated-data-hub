apiVersion: v1
kind: Secret
metadata:
  name: omics-beam-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  BEAM_SECRET: {{ .Values.secrets.beamSecret | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: beam-proxy-key
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  APP_itcc-datalake_KEY: {{ .Values.secrets.app_itcc_datalake_key | quote }}
  proxy.pem: |-
{{ .Values.secrets.proxyPem | nindent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: omics-s3-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  S3_ACCESS_KEY_ID: {{ .Values.secrets.s3AccessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.secrets.s3SecretAccessKey | quote }}