apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-webui
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: garage-webui
  template:
    metadata:
      labels:
        app: garage-webui
    spec:
      containers:
        - name: webui
          image: {{ .Values.webui.image | quote }}
          ports:
            - containerPort: {{ .Values.webui.port }}
{{- with .Values.beamProxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: API_BASE_URL
              value: "http://garage:{{ .Values.garage.adminPort }}"
            - name: S3_ENDPOINT_URL
              value: "http://garage:{{ .Values.garage.s3Port }}"
          volumeMounts:
            - name: garage-config
              mountPath: /etc/garage.toml
              subPath: garage.toml
              readOnly: true
      volumes:
        - name: garage-config
          secret:
            secretName: garage-config
---
apiVersion: v1
kind: Service
metadata:
  name: garage-webui
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: garage-webui
  ports:
    - name: http
      port: {{ .Values.webui.port }}
      targetPort: {{ .Values.webui.port }}