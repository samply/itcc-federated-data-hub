apiVersion: apps/v1
kind: Deployment
metadata:
  name: meta-cache
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meta-cache
  template:
    metadata:
      labels:
        app: meta-cache
    spec:
      containers:
        - name: meta-cache
          image: {{ .Values.metaCache.image }}
          ports:
            - containerPort: {{ .Values.metaCache.port }}
          env:
            - name: PROJECT
              value: {{ .Values.metaCache.projekt | quote }}
            - name: API_KEY
              value: {{ .Values.metaCache.ApiKey | quote }}
            - name: S3_DEFAULT_REGION
              value: {{ .Values.omicsTask.s3.region | quote }}
            - name: S3_ENDPOINT_URL
              value: {{ .Values.omicsTask.s3.endpointUrl | quote }}
            - name: S3_BUCKET
              value: {{ .Values.omicsTask.s3.bucket | quote }}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: omics-s3-secret
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: omics-s3-secret
                  key: S3_SECRET_ACCESS_KEY
            - name: RUST_LOG
              value: {{ .Values.omicsTask.rustLog | quote }}

---
apiVersion: v1
kind: Service
metadata:
  name: meta-cache
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: meta-cache
  ports:
    - port: {{ .Values.metaCache.port }}
      targetPort: {{ .Values.metaCache.port }}
