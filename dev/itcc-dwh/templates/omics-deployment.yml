{{- range $mode, $cfg := .Values.omics.modes }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omics-dwh-{{ $mode }}
  namespace: {{ $.Release.Namespace }}
spec:
  replicas: {{ $cfg.replicas | default 1 }}
  selector:
    matchLabels:
      app: omics-dwh-{{ $mode }}
  template:
    metadata:
      labels:
        app: omics-dwh-{{ $mode }}
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: omics-dwh-{{ $mode }}
          image: {{ $cfg.image | quote }}
          imagePullPolicy: {{ $cfg.imagePullPolicy | default "IfNotPresent" }}
          {{- with $cfg.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: BEAM_ID
              value: {{ $cfg.beamId | quote }}
            - name: BEAM_SECRET
              valueFrom:
                secretKeyRef:
                  name: omics-beam-secret
                  key: BEAM_SECRET
            - name: BEAM_URL
              value: {{ $cfg.beamUrl | quote }}
            - name: S3_DEFAULT_REGION
              value: {{ $cfg.s3.region | quote }}
            - name: S3_ENDPOINT_URL
              value: {{ $cfg.s3.endpointUrl | quote }}
            - name: S3_BUCKET
              value: {{ $cfg.s3.bucket | quote }}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: omics-s3-secret
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: omics-s3-secret
                  key: S3_SECRET_ACCESS_KEY
            - name: RUST_LOG
              value: {{ $cfg.rustLog | default "info" | quote }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: omics-data
---
{{- end }}
