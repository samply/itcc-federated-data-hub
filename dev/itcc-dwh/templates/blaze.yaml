{{- if .Values.blaze.auth.password }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: itcc-blaze
  namespace: itcc-dev
  annotations:
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: dwh-blaze-secret
    nginx.ingress.kubernetes.io/auth-realm: "ITCC Blaze"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.blaze.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: blaze
                port:
                  number: 8080
{{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: blaze
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: blaze
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blaze
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blaze
  template:
    metadata:
      labels:
        app: blaze
    spec:
      containers:
        - name: blaze
          image: samply/blaze:latest
          ports:
            - containerPort: 8080
          {{- with .Values.blaze.resources }}
          resources:
              {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /fhir/metadata
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
